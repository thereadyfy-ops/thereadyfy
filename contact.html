<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Contact — The Readyfy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Same Navigation -->

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <h1 class="page-title">Let's <span class="gradient">Talk</span></h1>
                    <p>Have a project in mind? We'd love to hear about it.</p>
                    
                    <div class="contact-details">
                        <div class="contact-item">
                            <i class="fas fa-envelope"></i>
                            <div>
                                <h4>Email</h4>
                                <a href="mailto:thereadyfy@gmail.com">thereadyfy@gmail.com</a>
                            </div>
                        </div>
                        <div class="contact-item">
                            <i class="fas fa-phone"></i>
                            <div>
                                <h4>Phone</h4>
                                <a href="tel:+923282188521">+92-3282188521</a>
                            </div>
                        </div>
                        <div class="contact-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <div>
                                <h4>Studio</h4>
                                <p></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="contact-form">
                    <!-- FIXED: Proper Formspree integration -->
                    <form id="contact-form" action="https://formspree.io/f/xpqbqwod" method="POST">
                        <!-- This hidden field sets the email subject -->
                        <input type="hidden" name="_subject" value="New message from The Readyfy">
                        
                        <!-- IMPORTANT: _replyto must contain the actual visitor's email, not a string -->
                        <!-- We'll use JavaScript to set this dynamically -->
                        <input type="hidden" name="_replyto" id="_replyto">
                        
                        <div class="form-group">
                            <input type="text" name="name" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" id="email" placeholder="Your Email" required>
                        </div>
                        <div class="form-group">
                            <input type="text" name="company" placeholder="Company">
                        </div>
                        <div class="form-group">
                            <select name="service">
                                <option value="">Select Service</option>
                                <option value="strategy">Strategy</option>
                                <option value="design">Design</option>
                                <option value="digital">Digital</option>
                                <option value="motion">Motion</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <textarea name="message" placeholder="Tell us about your project" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Send Message</button>
                    </form>
                    <!-- Optional: simple success/error message area (doesn't affect styling) -->
                    <div id="form-status" style="margin-top: 1rem; text-align: center; font-size: 0.9rem; display: none;"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Small script to handle dynamic _replyto and better error/success display (no theme changes) -->
    <script>
        (function() {
            const form = document.getElementById('contact-form');
            const replytoField = document.getElementById('_replyto');
            const statusDiv = document.getElementById('form-status');
            
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    // Set _replyto to the user's email address before submit
                    const emailInput = document.getElementById('email');
                    if (emailInput && replytoField) {
                        replytoField.value = emailInput.value;
                    }
                    
                    // Show sending indicator (optional, but helpful)
                    const submitBtn = form.querySelector('button[type="submit"]');
                    const originalText = submitBtn.textContent;
                    submitBtn.textContent = 'Sending...';
                    submitBtn.disabled = true;
                    
                    try {
                        const formData = new FormData(form);
                        const response = await fetch(form.action, {
                            method: 'POST',
                            body: formData,
                            headers: { 'Accept': 'application/json' }
                        });
                        
                        if (response.ok) {
                            // Success
                            statusDiv.style.display = 'block';
                            statusDiv.style.color = '#4CAF50';
                            statusDiv.textContent = '✓ Message sent successfully! We\'ll get back to you soon.';
                            form.reset();
                            // Clear replyto
                            if (replytoField) replytoField.value = '';
                            // Hide message after 5 seconds
                            setTimeout(() => { statusDiv.style.display = 'none'; }, 5000);
                        } else {
                            // Error from Formspree
                            const errorData = await response.json();
                            throw new Error(errorData.error || 'Submission failed');
                        }
                    } catch (error) {
                        statusDiv.style.display = 'block';
                        statusDiv.style.color = '#f44336';
                        statusDiv.textContent = '❌ Something went wrong. Please email us directly at thereadyfy@gmail.com';
                        setTimeout(() => { statusDiv.style.display = 'none'; }, 6000);
                    } finally {
                        submitBtn.textContent = originalText;
                        submitBtn.disabled = false;
                    }
                });
            }
        })();
    </script>
</body>
</html>
